<!--
  IntelliFront — Navigation Components
  Variants: minimal-sticky, centered-logo, split-nav
  Motion tier: 2–3 (subtle — nav should never be the loudest thing on the page)
-->

<!-- ============================================================
     VARIANT 1 — MINIMAL STICKY NAV (Tier 2–3)
     Best for: SaaS, portfolio, agency, developer tools
     Character: invisible when scrolled to top, gains substance on scroll
     ============================================================ -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --font-body:   system-ui, sans-serif;
    --color-bg:    oklch(97% 0.006 250);
    --color-text:  oklch(15% 0.01 250);
    --color-muted: oklch(48% 0.01 250);
    --color-accent:oklch(52% 0.2 250);
    --color-border:oklch(88% 0.008 250);
    --ease-out:    cubic-bezier(0.23, 1, 0.32, 1);
  }

  /* Nav shell */
  .nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 1rem clamp(1rem, 4vw, 2.5rem);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 2rem;
    transition: background-color 300ms var(--ease-out),
                border-bottom-color 300ms var(--ease-out),
                backdrop-filter 300ms var(--ease-out);
    border-bottom: 1px solid transparent;
    font-family: var(--font-body);
  }

  /* Scrolled state — added via JS */
  .nav.scrolled {
    background-color: oklch(97% 0.006 250 / 0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom-color: var(--color-border);
  }

  /* Logo */
  .nav__logo {
    font-size: 1.0625rem;
    font-weight: 600;
    color: var(--color-text);
    text-decoration: none;
    letter-spacing: -0.02em;
    flex-shrink: 0;
  }

  /* Links */
  .nav__links {
    display: flex;
    align-items: center;
    gap: 0.25rem;
    list-style: none;
  }
  .nav__links a {
    display: block;
    padding: 0.4rem 0.75rem;
    font-size: 0.9375rem;
    color: var(--color-muted);
    text-decoration: none;
    border-radius: 6px;
    transition: color 150ms, background-color 150ms;
  }
  .nav__links a:hover {
    color: var(--color-text);
    background-color: oklch(90% 0.01 250);
  }

  /* CTA */
  .nav__cta {
    display: inline-flex;
    align-items: center;
    gap: 0.375rem;
    padding: 0.5rem 1.125rem;
    font-size: 0.9375rem;
    font-weight: 500;
    color: oklch(98% 0.005 250);
    background-color: var(--color-text);
    border-radius: 8px;
    text-decoration: none;
    transition: transform 120ms var(--ease-out),
                background-color 150ms;
    flex-shrink: 0;
  }
  .nav__cta:hover  { background-color: oklch(25% 0.015 250); }
  .nav__cta:active { transform: scale(0.97); }
  .nav__cta:focus-visible {
    outline: 2px solid var(--color-accent);
    outline-offset: 2px;
  }

  /* Mobile hamburger */
  .nav__toggle {
    display: none;
    flex-direction: column;
    gap: 5px;
    width: 28px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 4px;
  }
  .nav__toggle span {
    display: block;
    height: 1.5px;
    background: var(--color-text);
    border-radius: 2px;
    transition: transform 280ms var(--ease-out), opacity 200ms;
  }
  .nav__toggle[aria-expanded="true"] span:nth-child(1) {
    transform: translateY(6.5px) rotate(45deg);
  }
  .nav__toggle[aria-expanded="true"] span:nth-child(2) {
    opacity: 0;
  }
  .nav__toggle[aria-expanded="true"] span:nth-child(3) {
    transform: translateY(-6.5px) rotate(-45deg);
  }

  /* Mobile drawer */
  @media (max-width: 640px) {
    .nav__links, .nav__cta { display: none; }
    .nav__toggle { display: flex; }

    .nav.open .nav__links {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      position: fixed;
      top: 56px; left: 0; right: 0;
      background: var(--color-bg);
      border-bottom: 1px solid var(--color-border);
      padding: 0.75rem 1rem 1rem;
      gap: 0.125rem;
      animation: drawerIn 250ms cubic-bezier(0.32, 0.72, 0, 1) forwards;
    }
    .nav.open .nav__cta {
      display: block;
      margin: 0 1rem 1rem;
      text-align: center;
    }
  }

  @keyframes drawerIn {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    .nav, .nav__cta, .nav__toggle span { transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>

<nav class="nav" id="site-nav" aria-label="Main navigation">
  <a href="/" class="nav__logo">Brand</a>

  <ul class="nav__links" id="nav-links">
    <li><a href="/product">Product</a></li>
    <li><a href="/pricing">Pricing</a></li>
    <li><a href="/docs">Docs</a></li>
    <li><a href="/blog">Blog</a></li>
  </ul>

  <a href="/signup" class="nav__cta">Get started</a>

  <button
    class="nav__toggle"
    id="nav-toggle"
    aria-controls="nav-links"
    aria-expanded="false"
    aria-label="Open navigation"
  >
    <span></span>
    <span></span>
    <span></span>
  </button>
</nav>

<script>
  // Scroll state
  const nav = document.getElementById('site-nav');
  const onScroll = () => nav.classList.toggle('scrolled', window.scrollY > 16);
  window.addEventListener('scroll', onScroll, { passive: true });

  // Mobile toggle
  const toggle = document.getElementById('nav-toggle');
  toggle.addEventListener('click', () => {
    const open = nav.classList.toggle('open');
    toggle.setAttribute('aria-expanded', open);
    toggle.setAttribute('aria-label', open ? 'Close navigation' : 'Open navigation');
  });
</script>
</body>
</html>
