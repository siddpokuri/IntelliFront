<!--
  IntelliFront — UI Kit
  Micro-components adapted from UIverse concepts. All code is independently
  rewritten — different class names, OKLCH colors, altered easing, modified
  structure, and new interaction logic throughout.

  USAGE RULES (read before using in any agent output):
  - Only apply when the site's tier and brand personality supports it
  - Never use if it would undermine professionalism or visual coherence
  - Each component is self-contained — copy only the relevant section
  - All colors use OKLCH; swap to match the project's design system
  - prefers-reduced-motion is respected throughout

  SECTIONS:
  1.  Theme toggle (sun/moon)
  2.  Stacked-shadow button
  3.  Arrow-slide button
  4.  Fill-slide button (bordered)
  5.  Blob-color shift button
  6.  Checkbox — animated wave
  7.  Flip checkbox
  8.  Mode pill switch
  9.  Share button with social tooltip
  10. 3D tilt card
  11. Blob-glow card
  12. Square spinner
  13. Orbiting dot spinner
  14. 3D tower loader
  15. Radial bar spinner
  16. Dark pill search input
  17. Outlined accent input
  18. Subscribe input with arrow
  19. Tile radio group
  20. Glider tab selector
  21. Wheel selector
  22. Flip login/signup form
  23. Minimal auth form
  24. Skew-reveal tooltip
  25. Shake tooltip
  26. Slide-out icon tooltip
-->

<style>
  /* ── Shared tokens (override per project) ──────────────────── */
  :root {
    --ui-surface:   oklch(97% 0.006 250);
    --ui-surface2:  oklch(93% 0.008 250);
    --ui-text:      oklch(15% 0.01 250);
    --ui-muted:     oklch(52% 0.01 250);
    --ui-border:    oklch(86% 0.009 250);
    --ui-accent:    oklch(55% 0.2 250);
    --ui-accent2:   oklch(60% 0.22 310);
    --ui-dark:      oklch(14% 0.01 250);
    --ui-ease:      cubic-bezier(0.23, 1, 0.32, 1);
    --ui-spring:    cubic-bezier(0.34, 1.4, 0.64, 1);
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>


<!-- ════════════════════════════════════════════════
     1. THEME TOGGLE — sun ↔ moon
     Tier 2+. Replaces icon set, OKLCH colors,
     different easing curve, renamed classes.
     ════════════════════════════════════════════════ -->
<style>
  .mode-toggle { display: flex; align-items: center; gap: 0.75rem; }

  .mode-toggle__track {
    -webkit-appearance: none; appearance: none;
    width: 5.5rem; height: 2.75rem;
    border-radius: 999px;
    background: oklch(92% 0.04 80);          /* warm sun yellow */
    padding: 0.2rem;
    cursor: pointer;
    position: relative;
    transition: background 400ms var(--ui-ease),
                box-shadow 150ms;
  }
  .mode-toggle__track::before {
    content: '';
    position: absolute;
    width: 2.35rem; height: 2.35rem;
    border-radius: 50%;
    background: oklch(82% 0.12 80);          /* yolk */
    top: 0.2rem; left: 0.2rem;
    box-shadow: 0 2px 6px oklch(0% 0 0 / 0.2);
    transition: transform 360ms var(--ui-ease),
                background 400ms var(--ui-ease);
  }
  .mode-toggle__track:checked {
    background: oklch(28% 0.04 260);          /* night sky */
  }
  .mode-toggle__track:checked::before {
    transform: translateX(2.75rem);
    background: oklch(88% 0.03 260);          /* moon grey */
    box-shadow:
      inset -4px -2px 0 0 oklch(72% 0.04 260), /* crater */
      0 2px 8px oklch(0% 0 0 / 0.4);
  }
  .mode-toggle__track:focus-visible {
    outline: 2px solid var(--ui-accent);
    outline-offset: 3px;
  }

  /* Full-page color fill on dark mode — mix-blend-mode: difference trick */
  .mode-toggle__fill {
    position: fixed; inset: 0;
    background: oklch(97% 0.006 250);
    mix-blend-mode: difference;
    pointer-events: none;
    transform: translateX(-100%);
    transition: transform 500ms var(--ui-ease);
    z-index: 9999;
  }
  .mode-toggle__track:checked ~ .mode-toggle__fill {
    transform: translateX(0);
  }
</style>

<label class="mode-toggle" aria-label="Toggle dark mode">
  <input type="checkbox" class="mode-toggle__track" id="modeToggle">
  <div class="mode-toggle__fill" aria-hidden="true"></div>
</label>


<!-- ════════════════════════════════════════════════
     2. STACKED-SHADOW BUTTON
     Tier 3–4. Layered box-shadow depth effect.
     Adapted: OKLCH neutrals, sharper hover collapse,
     different radius and transition curve.
     ════════════════════════════════════════════════ -->
<style>
  .btn-stacked {
    font-size: 1rem;
    font-weight: 600;
    padding: 0.65rem 1.75rem;
    background: var(--ui-surface);
    color: var(--ui-text);
    border: none;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: -0.01em;
    box-shadow:
      2px 2px 0 oklch(88% 0 0),
      4px 4px 0 oklch(80% 0 0),
      6px 6px 0 oklch(72% 0 0),
      8px 8px 0 oklch(62% 0 0),
      10px 10px 0 oklch(50% 0 0),
      12px 12px 0 oklch(38% 0 0);
    transition: box-shadow 220ms var(--ui-ease),
                transform 220ms var(--ui-ease),
                background 220ms;
  }
  .btn-stacked:hover {
    background: var(--ui-text);
    color: var(--ui-surface);
    box-shadow: none;
    transform: translate(6px, 6px);
  }
  .btn-stacked:active {
    transform: translate(8px, 8px);
  }
  .btn-stacked:focus-visible {
    outline: 2px solid var(--ui-accent);
    outline-offset: 3px;
  }
</style>

<button class="btn-stacked">Submit</button>


<!-- ════════════════════════════════════════════════
     3. ARROW-SLIDE BUTTON
     Tier 2–3. Arrow reveals on hover.
     Adapted: single CSS custom property for color,
     different border-radius, smoother arrow motion.
     ════════════════════════════════════════════════ -->
<style>
  .btn-arrow {
    --clr: var(--ui-accent);
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.75rem 1.5rem;
    background: var(--clr);
    color: oklch(98% 0.005 250);
    border: none;
    border-radius: 10px;
    font-size: 0.9375rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 200ms;
  }
  .btn-arrow:hover { background: var(--ui-dark); }
  .btn-arrow:active { transform: scale(0.97); }
  .btn-arrow:focus-visible { outline: 2px solid var(--clr); outline-offset: 3px; }

  .btn-arrow__icon {
    display: flex;
    align-items: center;
    overflow: hidden;
    width: 0.875rem;
  }
  .btn-arrow__line {
    width: 0.875rem;
    height: 1.5px;
    background: currentColor;
    position: relative;
    transition: width 200ms var(--ui-ease);
  }
  .btn-arrow__line::after {
    content: '';
    position: absolute;
    right: 0; top: -3px;
    border: solid currentColor;
    border-width: 0 1.5px 1.5px 0;
    padding: 3px;
    transform: rotate(-45deg);
    transition: right 200ms var(--ui-ease);
  }
  .btn-arrow:hover .btn-arrow__line { width: 1.25rem; }
  .btn-arrow:hover .btn-arrow__line::after { right: -2px; }
</style>

<button class="btn-arrow">
  Continue
  <span class="btn-arrow__icon" aria-hidden="true">
    <span class="btn-arrow__line"></span>
  </span>
</button>


<!-- ════════════════════════════════════════════════
     4. FILL-SLIDE BUTTON (bordered)
     Tier 3. Background slides in from left on hover.
     Adapted: border color via accent, pill removed
     for rectangular brand feel, faster transition.
     ════════════════════════════════════════════════ -->
<style>
  .btn-slide {
    display: inline-block;
    padding: 0.75rem 1.75rem;
    font-size: 0.9375rem;
    font-weight: 700;
    color: var(--ui-accent);
    border: 2px solid var(--ui-accent);
    background: transparent;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    z-index: 0;
    letter-spacing: 0.01em;
    transition: color 280ms var(--ui-ease);
  }
  .btn-slide::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--ui-accent);
    transform: translateX(-102%);
    transition: transform 280ms var(--ui-ease);
    z-index: -1;
  }
  .btn-slide:hover { color: oklch(98% 0.005 250); }
  .btn-slide:hover::before { transform: translateX(0); }
  .btn-slide:active { transform: scale(0.98); }
  .btn-slide:focus-visible { outline: 2px solid var(--ui-accent); outline-offset: 3px; }
</style>

<button class="btn-slide">View collection</button>


<!-- ════════════════════════════════════════════════
     5. BLOB-SHIFT BUTTON
     Tier 4–5. Colored blobs shift hue on hover.
     Adapted: OKLCH blob colors, different hue angles,
     glass overlay uses oklch, renamed internals.
     Use on dark backgrounds or hero CTAs only.
     ════════════════════════════════════════════════ -->
<style>
  .btn-blob {
    position: relative;
    font-size: 1rem;
    font-weight: 600;
    border-radius: 999px;
    width: 9em; height: 3em;
    border: none; cursor: pointer;
    color: oklch(98% 0.005 0);
    overflow: hidden;
    z-index: 0;
  }
  .btn-blob__face {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    border-radius: 999px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    background: oklch(100% 0 0 / 0.25);
    z-index: 1;
    pointer-events: none;
  }
  .btn-blob__orb {
    position: absolute;
    border-radius: 3em;
    width: 5em; height: 3em;
    z-index: -1;
    transition: transform 300ms var(--ui-ease),
                background 300ms;
  }
  .btn-blob__orb:nth-child(1) { left: 0;    top: 0;    background: oklch(72% 0.22 35);  }
  .btn-blob__orb:nth-child(2) { left: 1.8em;top: 0;    background: oklch(62% 0.24 310); }
  .btn-blob__orb:nth-child(3) { left: 4em;  top: -1em; background: oklch(66% 0.22 0);   }
  .btn-blob__orb:nth-child(4) { left: 4.3em;top: 1.6em;background: oklch(55% 0.22 240); }
  .btn-blob:hover .btn-blob__orb { transform: scale(1.35); }
  .btn-blob:hover .btn-blob__orb:nth-child(1) { background: oklch(55% 0.22 240); }
  .btn-blob:hover .btn-blob__orb:nth-child(2) { background: oklch(66% 0.22 0);   }
  .btn-blob:hover .btn-blob__orb:nth-child(3) { background: oklch(62% 0.24 310); }
  .btn-blob:hover .btn-blob__orb:nth-child(4) { background: oklch(72% 0.22 35);  }
  .btn-blob:active { outline: 2px solid oklch(98% 0.005 0); }
  .btn-blob:focus-visible { outline: 2px solid oklch(98% 0.005 0); outline-offset: 3px; }
</style>

<button class="btn-blob">
  <span class="btn-blob__orb"></span>
  <span class="btn-blob__orb"></span>
  <span class="btn-blob__orb"></span>
  <span class="btn-blob__orb"></span>
  <span class="btn-blob__face">Explore</span>
</button>


<!-- ════════════════════════════════════════════════
     6. CHECKBOX — wave bounce
     Tier 2+. Animated checkmark on check.
     Adapted: OKLCH accent, faster stroke animation,
     renamed wrapper, slightly larger hit area.
     ════════════════════════════════════════════════ -->
<style>
  .chk-wave { display: inline-flex; align-items: center; gap: 0.5rem; cursor: pointer; }
  .chk-wave__input { display: none; }
  .chk-wave__box {
    position: relative;
    width: 20px; height: 20px;
    border-radius: 4px;
    border: 1.5px solid var(--ui-border);
    flex-shrink: 0;
    transition: border-color 200ms, background 200ms;
  }
  .chk-wave__box svg {
    position: absolute;
    top: 2px; left: 1px;
    fill: none;
    stroke: oklch(98% 0.005 250);
    stroke-width: 2.2;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 18px;
    stroke-dashoffset: 18px;
    transition: stroke-dashoffset 280ms var(--ui-ease) 80ms;
  }
  .chk-wave__box::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--ui-accent);
    border-radius: 50%;
    transform: scale(0);
    opacity: 0;
  }
  .chk-wave:hover .chk-wave__box { border-color: var(--ui-accent); }
  .chk-wave__input:checked + .chk-wave__box {
    background: var(--ui-accent);
    border-color: var(--ui-accent);
    animation: chkWave 350ms var(--ui-ease);
  }
  .chk-wave__input:checked + .chk-wave__box svg {
    stroke-dashoffset: 0;
  }
  .chk-wave__input:checked + .chk-wave__box::before {
    animation: chkRipple 500ms var(--ui-ease) forwards;
  }
  @keyframes chkWave { 50% { transform: scale(0.88); } }
  @keyframes chkRipple {
    from { transform: scale(0); opacity: 0.5; }
    to   { transform: scale(3); opacity: 0; }
  }
  .chk-wave__label { font-size: 0.9375rem; color: var(--ui-text); user-select: none; }
</style>

<label class="chk-wave">
  <input type="checkbox" class="chk-wave__input">
  <span class="chk-wave__box">
    <svg viewBox="0 0 14 12" width="14" height="12" aria-hidden="true">
      <polyline points="1.5 6 5 10 12.5 1.5"/>
    </svg>
  </span>
  <span class="chk-wave__label">I agree to the terms</span>
</label>


<!-- ════════════════════════════════════════════════
     7. FLIP CHECKBOX
     Tier 3–4. Card flips between states on check.
     Adapted: OKLCH gradient faces, different icon
     colors, faster flip, added focus ring.
     ════════════════════════════════════════════════ -->
<style>
  .chk-flip { display: inline-block; }
  .chk-flip__input { display: none; }
  .chk-flip__label { cursor: pointer; display: block; }
  .chk-flip__card {
    width: 52px; height: 52px;
    perspective: 900px;
  }
  .chk-flip__front,
  .chk-flip__back {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    border-radius: 10px;
    backface-visibility: hidden;
    transition: transform 350ms var(--ui-ease);
    box-shadow: 0 2px 8px oklch(0% 0 0 / 0.12);
  }
  .chk-flip__front {
    background: linear-gradient(135deg,
      oklch(62% 0.22 20) 0%,
      oklch(68% 0.2 350) 100%);
  }
  .chk-flip__back {
    background: linear-gradient(135deg,
      oklch(58% 0.2 155) 0%,
      oklch(62% 0.2 200) 100%);
    transform: rotateY(180deg);
  }
  .chk-flip__front svg, .chk-flip__back svg {
    stroke: oklch(98% 0.005 0);
    fill: none;
    stroke-width: 2.2;
    stroke-linecap: round;
    stroke-linejoin: round;
    width: 24px; height: 24px;
  }
  .chk-flip__card { position: relative; transform-style: preserve-3d; }
  .chk-flip__label:hover .chk-flip__card { transform: scale(1.08); }
  .chk-flip__input:checked ~ .chk-flip__label .chk-flip__front {
    transform: rotateY(180deg);
  }
  .chk-flip__input:checked ~ .chk-flip__label .chk-flip__back {
    transform: rotateY(0deg);
  }
  .chk-flip__input:focus-visible ~ .chk-flip__label .chk-flip__card {
    outline: 2px solid var(--ui-accent);
    outline-offset: 3px;
    border-radius: 10px;
  }
</style>

<div class="chk-flip">
  <input type="checkbox" id="flipChk" class="chk-flip__input">
  <label for="flipChk" class="chk-flip__label">
    <div class="chk-flip__card">
      <div class="chk-flip__front">
        <!-- X icon -->
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <line x1="6" y1="6" x2="18" y2="18"/>
          <line x1="18" y1="6" x2="6" y2="18"/>
        </svg>
      </div>
      <div class="chk-flip__back">
        <!-- Check icon -->
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <polyline points="4 12 9.5 17.5 20 7"/>
        </svg>
      </div>
    </div>
  </label>
</div>

<!-- ════════════════════════════════════════════════
     10. 3D TILT CARD (CSS-only base, JS enhances)
     Tier 4–5. Card tilts toward cursor.

<!-- JS tilt enhancement — applies to all [data-tilt] elements -->
<script>
  document.querySelectorAll('[data-tilt]').forEach(card => {
    const str = parseFloat(card.dataset.tilt) || 14;
    const wrap = card.closest('.tilt-wrap');
    wrap.addEventListener('mousemove', e => {
      const r = card.getBoundingClientRect();
      const x = (e.clientX - r.left) / r.width  - 0.5;
      const y = (e.clientY - r.top)  / r.height - 0.5;
      card.style.transform = `
        perspective(900px)
        rotateY(${x * str}deg)
        rotateX(${-y * str}deg)
        scale(1.015)
      `;
    });
    wrap.addEventListener('mouseleave', () => {
      card.style.transition = 'transform 600ms cubic-bezier(0.23,1,0.32,1)';
      card.style.transform  = 'perspective(900px) rotateY(0) rotateX(0) scale(1)';
      setTimeout(() => card.style.transition = '', 600);
    });
    wrap.addEventListener('mouseenter', () => {
      card.style.transition = 'transform 120ms linear';
    });
  });
</script>

  .glider-tabs input[type="radio"] { display: none; }
  .glider-tabs__label {
    display: flex; align-items: center; justify-content: center;
    padding: 0.4rem 1.125rem;
    font-size: 0.875rem; font-weight: 500;
    color: var(--ui-muted);
    border-radius: 7px;
    cursor: pointer;
    position: relative; z-index: 2;
    transition: color 200ms;
    white-space: nowrap;
    min-width: 60px;
  }
  .glider-tabs input:checked + .glider-tabs__label { color: var(--ui-text); }
  .glider-tabs__slider {
    position: absolute;
    height: calc(100% - 8px);
    background: var(--ui-surface2);
    border-radius: 7px;
    border: 1px solid var(--ui-border);
    top: 4px; left: 4px;
    z-index: 1;
    transition: transform 220ms var(--ui-ease), width 220ms var(--ui-ease);
    /* Width/position set by JS below */
  }
</style>
<div class="glider-tabs">
  <input type="radio" name="gtabs" id="gt1" checked>
  <label class="glider-tabs__label" for="gt1">Design</label>
  <input type="radio" name="gtabs" id="gt2">
  <label class="glider-tabs__label" for="gt2">Code</label>
  <input type="radio" name="gtabs" id="gt3">
  <label class="glider-tabs__label" for="gt3">Preview</label>
  <div class="glider-tabs__slider" id="gliderSlider"></div>
</div>
<script>
  (function() {
    const tabs  = document.querySelector('.glider-tabs');
    const slider = document.getElementById('gliderSlider');
    function updateSlider() {
      const checked = tabs.querySelector('input:checked');
      if (!checked) return;
      const lbl = tabs.querySelector(`label[for="${checked.id}"]`);
      const tabsRect = tabs.getBoundingClientRect();
      const lblRect  = lbl.getBoundingClientRect();
      slider.style.width     = lblRect.width + 'px';
      slider.style.transform = `translateX(${lblRect.left - tabsRect.left - 4}px)`;
    }
    tabs.querySelectorAll('input').forEach(r => r.addEventListener('change', updateSlider));
    updateSlider();
  })();
</script>


<!-- ════════════════════════════════════════════════

<style>

  .auth-card__title {

</style>

     animation (too distracting), renamed, shake

<style>
  .tooltip-shake {
    position: relative; display: inline-grid;

    color: var(--ui-text);
    overflow: hidden;
  }
  .tooltip-shake__label {
    position: absolute; inset: 0;
    display: grid; place-items: center;
    transition: all 350ms var(--ui-ease);
  }
  .tooltip-shake__panel {
    position: absolute;
    top: 0; left: 100%;
    width: 100%; height: 100%;
    background: var(--ui-dark);
    border-radius: 8px;
    display: grid; place-items: center;
    color: oklch(95% 0.005 250);
    font-size: 0.875rem; font-weight: 500;
    transform: scale(0);
    transform-origin: left center;
    transition: all 350ms var(--ui-ease);
  }
  .tooltip-shake__tip {
    position: absolute;
    top: -100%; left: 50%;
    transform: translateX(-50%);
    background: var(--ui-dark);
    color: oklch(95% 0.005 250);
    font-size: 0.8125rem; font-weight: 500;
    padding: 0.3rem 0.75rem;
    border-radius: 6px;
    opacity: 0; scale: 0;
    transform-origin: bottom center;
    pointer-events: none;
    transition: all 300ms var(--ui-spring);
    white-space: nowrap;
  }
  .tooltip-shake__tip::after {

    position: absolute;
    top: 100%; left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: var(--ui-dark);
  }
  .tooltip-shake:hover .tooltip-shake__tip {
    top: -120%; opacity: 1; scale: 1;
    animation: shakeSmall 450ms var(--ui-ease) both;
  }
  .tooltip-shake:hover .tooltip-shake__label {
    opacity: 0; left: 100%; transform: scale(0);
  }
  .tooltip-shake:hover .tooltip-shake__panel { transform: scale(1); left: 0; }
  @keyframes shakeSmall {
    0%   { rotate: 0; }

</style>
