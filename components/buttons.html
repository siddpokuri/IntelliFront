<!--
  IntelliFront — Button Library
  All components independently rewritten from UIverse concepts.
  Different class names, OKLCH colors, altered easing, modified structure throughout.
  No original source code reproduced.

  VARIANTS:
  1.  Stacked shadow (depth collapses on hover)
  2.  Arrow slide (arrow extends on hover)
  3.  Fill wipe (background slides in from left)
  4.  Blob shift (color-shifting blobs behind glass)
  5.  3D perspective press (button tilts into the page on hover)
  6.  Bordered fill (transparent with color flood)
  7.  Magnetic pill (pulls toward cursor)
  8.  Underline reveal (border slides under text)
  9.  Icon flip (icon rotates 180° on hover)
  10. Split reveal (text splits apart, icon slides in)
  11. Shimmer sweep (light sweeps across on hover)
  12. Count-up CTA (number ticks up on hover)
  13. Dark ghost (inverted for dark backgrounds)
  14. Soft neumorphic (inset shadow press feel)
  15. Minimal text link (animated underline)

  USAGE GUIDE:
  — Pick variant based on brand tier and context (see decision tree in agents/05-godmode.md)
  — Adapt OKLCH values to the site's design system before use
  — All buttons include :hover, :active (scale or translate), :focus-visible
  — prefers-reduced-motion respected throughout
  — Never paste verbatim — remap colors to the project palette
-->

<style>
  /* ── Shared tokens ─────────────────────────────────────────── */
  :root {
    --btn-surface:  oklch(97% 0.006 250);
    --btn-text:     oklch(15% 0.01 250);
    --btn-muted:    oklch(52% 0.01 250);
    --btn-accent:   oklch(55% 0.2 250);
    --btn-dark:     oklch(12% 0.008 250);
    --btn-border:   oklch(86% 0.009 250);
    --ease-out:     cubic-bezier(0.23, 1, 0.32, 1);
    --ease-spring:  cubic-bezier(0.34, 1.4, 0.64, 1);
    --ease-expo:    cubic-bezier(0.16, 1, 0.3, 1);
  }

  /* ── Reset ─────────────────────────────────────────────────── */
  .btn-demo { margin: 0.5rem; display: inline-flex; }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>


<!-- ════════════════════════════════════════════════════════════
     1. STACKED SHADOW
     Layered box-shadows collapse on hover with translate.
     Best for: bold DTC, editorial, e-commerce, neobrutalist-adjacent.
     Context: secondary CTAs, "view all", card actions on bold brands.
     ════════════════════════════════════════════════════════════ -->
<style>
  .btn-stacked {
    display: inline-flex;
    align-items: center;
    padding: 0.65rem 1.5rem;
    font-size: 0.9375rem;
    font-weight: 600;
    color: var(--btn-text);
    background: var(--btn-surface);
    border: 1.5px solid oklch(72% 0 0);
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: -0.01em;
    box-shadow:
      2px 2px 0 oklch(82% 0 0),
      4px 4px 0 oklch(72% 0 0),
      6px 6px 0 oklch(60% 0 0),
      8px 8px 0 oklch(46% 0 0),
      10px 10px 0 oklch(32% 0 0);
    transition:
      box-shadow 200ms var(--ease-out),
      transform 200ms var(--ease-out),
      background 200ms;
  }
  .btn-stacked:hover {
    background: var(--btn-text);
    color: var(--btn-surface);
    box-shadow: none;
    transform: translate(5px, 5px);
  }
  .btn-stacked:active { transform: translate(7px, 7px); }
  .btn-stacked:focus-visible {
    outline: 2px solid var(--btn-accent);
    outline-offset: 3px;
  }
</style>

<button class="btn-stacked btn-demo">View all work</button>


<!-- ════════════════════════════════════════════════════════════
     2. ARROW SLIDE
     Arrow line extends and arrowhead moves right on hover.
     Best for: SaaS, fintech, developer tools, any "next step" CTA.
     Context: hero primary CTA, pricing, feature section links.
     ════════════════════════════════════════════════════════════ -->
<style>
  .btn-arrow {
    --clr: var(--btn-accent);
    display: inline-flex;
    align-items: center;
    gap: 0.625rem;
    padding: 0.75rem 1.5rem;
    font-size: 0.9375rem;
    font-weight: 600;
    color: oklch(98% 0.005 250);
    background: var(--clr);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: background 200ms;
  }
  .btn-arrow:hover  { background: var(--btn-dark); }
  .btn-arrow:active { transform: scale(0.97); }
  .btn-arrow:focus-visible {
    outline: 2px solid var(--clr);
    outline-offset: 3px;
  }
  .btn-arrow__track {
    display: flex;
    align-items: center;
    overflow: hidden;
    width: 1rem;
  }
  .btn-arrow__shaft {
    width: 1rem;
    height: 1.5px;
    background: currentColor;
    position: relative;
    transition: width 220ms var(--ease-out);
  }
  .btn-arrow__shaft::after {
    content: '';
    position: absolute;
    right: 0; top: -3.5px;
    border: solid currentColor;
    border-width: 0 1.5px 1.5px 0;
    padding: 3px;
    transform: rotate(-45deg);
    transition: right 220ms var(--ease-out);
  }
  .btn-arrow:hover .btn-arrow__shaft        { width: 1.375rem; }
  .btn-arrow:hover .btn-arrow__shaft::after { right: -2px; }
</style>

<button class="btn-arrow btn-demo">
  Get started

</button>


<!-- ════════════════════════════════════════════════════════════

     ════════════════════════════════════════════════════════════ -->
<style>

<!-- ════════════════════════════════════════════════════════════
     4. BLOB SHIFT
     Color-shifting blobs rotate hues on hover behind glass.
     Best for: agencies, AI products, dark-hero CTAs, Tier 4–5.
     Context: single hero CTA on dark or gradient backgrounds.
     NOT for: healthcare, legal, institutional, light minimal sites.
     ════════════════════════════════════════════════════════════ -->
<style>
  .btn-blob {
    position: relative;
    font-size: 1rem;
    font-weight: 600;
    border-radius: 999px;
    width: 10em; height: 3.25em;
    border: none;
    cursor: pointer;
    color: oklch(98% 0.005 0);
    overflow: hidden;
    z-index: 0;
  }
  .btn-blob__face {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    border-radius: 999px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    background: oklch(100% 0 0 / 0.22);
    z-index: 1;
    pointer-events: none;
  }
  .btn-blob__orb {
    position: absolute;
    border-radius: 3em;
    width: 5em; height: 3.25em;
    z-index: -1;
    transition: transform 320ms var(--ease-out), background 320ms;
  }
  .btn-blob__orb:nth-child(1) { left: 0;     top: 0;     background: oklch(72% 0.22 35);  }
  .btn-blob__orb:nth-child(2) { left: 1.8em; top: 0;     background: oklch(62% 0.24 310); }
  .btn-blob__orb:nth-child(3) { left: 4em;   top: -1em;  background: oklch(66% 0.22 0);   }
  .btn-blob__orb:nth-child(4) { left: 4.3em; top: 1.6em; background: oklch(55% 0.22 240); }
  .btn-blob:hover .btn-blob__orb              { transform: scale(1.4); }
  .btn-blob:hover .btn-blob__orb:nth-child(1) { background: oklch(55% 0.22 240); }
  .btn-blob:hover .btn-blob__orb:nth-child(2) { background: oklch(66% 0.22 0);   }
  .btn-blob:hover .btn-blob__orb:nth-child(3) { background: oklch(62% 0.24 310); }
  .btn-blob:hover .btn-blob__orb:nth-child(4) { background: oklch(72% 0.22 35);  }
  .btn-blob:active { outline: 2px solid oklch(98% 0 0); transform: scale(0.97); }
  .btn-blob:focus-visible { outline: 2px solid oklch(98% 0.005 0); outline-offset: 3px; }
</style>

<button class="btn-blob btn-demo">
  <span class="btn-blob__orb"></span>
  <span class="btn-blob__orb"></span>
  <span class="btn-blob__orb"></span>
  <span class="btn-blob__orb"></span>
  <span class="btn-blob__face">Explore now</span>
</button>

<!-- ════════════════════════════════════════════════════════════
     7. MAGNETIC PILL
     Pulls slightly toward cursor position.
     Best for: agencies, portfolios, Tier 4–5 interactive brands.
     Context: single primary CTA where delight is the point.
     Requires JS. Falls back gracefully without it.
     ════════════════════════════════════════════════════════════ -->
<style>
  .btn-magnetic {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.875rem 2rem;
    font-size: 0.9375rem;
    font-weight: 600;
    color: oklch(98% 0.005 250);
    background: var(--btn-accent);
    border: none;
    border-radius: 999px;
    cursor: pointer;
    will-change: transform;
    transition: background 200ms;
  }
  .btn-magnetic:hover  { background: var(--btn-dark); }
  .btn-magnetic:active { transform: scale(0.96) !important; }
  .btn-magnetic:focus-visible {
    outline: 2px solid var(--btn-accent);
    outline-offset: 3px;
  }
</style>

<button class="btn-magnetic btn-demo" data-magnetic>
  Work with us
  <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
    <path d="M2.5 7h9M8 3.5L11.5 7 8 10.5" stroke="currentColor" stroke-width="1.5"
      stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</button>

<script>
  document.querySelectorAll('[data-magnetic]').forEach(btn => {
    btn.addEventListener('mousemove', e => {
      const r = btn.getBoundingClientRect();
      const x = (e.clientX - r.left - r.width  / 2) * 0.22;
      const y = (e.clientY - r.top  - r.height / 2) * 0.22;
      btn.style.transition = 'transform 150ms ease-out, background 200ms';
      btn.style.transform  = `translate(${x}px, ${y}px)`;
    });
    btn.addEventListener('mouseleave', () => {
      btn.style.transition = 'transform 500ms cubic-bezier(0.34, 1.4, 0.64, 1), background 200ms';
      btn.style.transform  = 'translate(0, 0)';
    });
  });
</script>

  }
  .btn-ghost-dark:active { transform: scale(0.97); }
  .btn-ghost-dark:focus-visible {
    outline: 2px solid oklch(60% 0.01 250);
    outline-offset: 3px;
  }
</style>

<div style="background: oklch(12% 0.008 250); padding: 1rem; display: inline-block; border-radius: 8px;">

<!-- ════════════════════════════════════════════════════════════
     14. PROGRESS / INSTALL STATE
     Animated progress fill on click, resolves to done state.
     Best for: SaaS onboarding, install flows, download triggers.
     Context: "Install extension", "Connect account", "Download".
     ════════════════════════════════════════════════════════════ -->
<style>
  .btn-progress {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.65rem 1.375rem;
    font-size: 0.9375rem;
    font-weight: 600;
    color: oklch(98% 0.005 250);
    background: var(--btn-accent);
    border: 2px solid oklch(62% 0.22 250);
    border-radius: 8px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    min-width: 9rem;
    justify-content: center;
    transition: background 300ms, border-color 300ms, transform 120ms;
  }
  .btn-progress::before {
    content: '';
    position: absolute;
    inset: 0;
    background: oklch(48% 0.18 250);
    transform: scaleX(0);
    transform-origin: left;
    transition: none;
    z-index: 0;
  }
  .btn-progress__label {
    position: relative;
    z-index: 1;
    transition: opacity 200ms;
  }
  .btn-progress__done {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.375rem;
    z-index: 1;
    opacity: 0;
    transition: opacity 300ms 200ms;
    color: oklch(98% 0.005 250);
    font-weight: 600;
  }
  .btn-progress.is-loading::before {
    transform: scaleX(1);
    transition: transform 2.5s linear;
  }
  .btn-progress.is-done {
    background: oklch(55% 0.18 150);
    border-color: oklch(60% 0.2 150);
  }
  .btn-progress.is-done .btn-progress__label { opacity: 0; }
  .btn-progress.is-done .btn-progress__done  { opacity: 1; }
  .btn-progress:active { transform: scale(0.97); }
  .btn-progress:focus-visible {
    outline: 2px solid var(--btn-accent);
    outline-offset: 3px;
  }
</style>

<button class="btn-progress btn-demo" id="progressBtn"
  onclick="
    const b = this;
    if (b.classList.contains('is-loading') || b.classList.contains('is-done')) return;
    b.classList.add('is-loading');
    setTimeout(() => {
      b.classList.remove('is-loading');
      b.classList.add('is-done');
      setTimeout(() => {
        b.classList.remove('is-done');
        b.querySelector('.btn-progress__label').style.opacity = '1';
      }, 2500);
    }, 2600);
  ">
  <span class="btn-progress__label">Install extension</span>
  <span class="btn-progress__done">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
      <polyline points="2 7.5 5.5 11 12 4" stroke="currentColor" stroke-width="1.8"
        stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Installed
  </span>
</button>

<!-- ════════════════════════════════════════════════════════════
     USAGE NOTES
     ════════════════════════════════════════════════════════════

  Decision guide — which button for which context:

  HERO PRIMARY CTA
    Dark background → btn-blob or btn-3d
    Light SaaS/fintech → btn-shimmer or btn-arrow
    Editorial/luxury → btn-fill or btn-flood

  HERO SECONDARY CTA
    Any → btn-fill (ghost) or btn-ghost-dark (on dark bg)
    Minimal → btn-underline or btn-text-link

  PRICING / UPGRADE
    → btn-shimmer (premium feel) or btn-arrow

  E-COMMERCE / DTC / BOLD BRAND
    → btn-stacked (physical depth, collapses on hover)

  AGENCY / PORTFOLIO / THEATRICAL
    → btn-blob or btn-split or btn-3d or btn-magnetic

  NAV CTA
    → btn-arrow (small) or btn-fill (small, no border-radius)

  UTILITY / FORM SUBMIT / LOW-KEY
    → btn-arrow or btn-fill or btn-underline

  ONBOARDING / INSTALL / DOWNLOAD
    → btn-progress (animated state change)

  WELLNESS / CALM UI
    → btn-neo (neumorphic press feel)

  TEXT-LEVEL CTA / EDITORIAL
    → btn-text-link or btn-underline

  DO NOT USE:
    btn-blob on healthcare, legal, or institutional sites
    btn-neo on dark backgrounds (it needs a light surface)
    btn-split or btn-magnetic on more than 1 CTA per page
    btn-3d anywhere accessibility is paramount (reduced motion degrades gracefully but the effect is theatrical)

  COLOR REMAPPING:
    All buttons use CSS custom properties from :root above.
    Before using in a project, remap to the site's design system:
    --btn-accent  → site's --color-accent
    --btn-dark    → site's --color-text (or dark surface)
    --btn-surface → site's --color-surface
    --btn-text    → site's --color-text-primary
    --btn-border  → site's --color-border
-->
